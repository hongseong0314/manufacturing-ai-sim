# pyproject.toml

# Black formatter configuration
[tool.black]
line-length = 88
target-version = ["py310"]

# Ruff linter configuration
[tool.ruff]
select = ["E", "F", "I", "B", "C4", "A"]
ignore = []
unfixable = ["B"]
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]
line-length = 88
target-version = "py310"

[tool.ruff.mccabe]
max-complexity = 10
